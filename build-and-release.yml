name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build WinFormsApp1/WinFormsApp1.csproj -c Release
      - name: Publish single-file
        run: |
          dotnet publish WinFormsApp1/WinFormsApp1.csproj -c Release -r win-x64 /p:PublishSingleFile=true /p:SelfContained=true -o publish\win-x64
      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinFormsApp1-publish
          path: publish\win-x64
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: publish\win-x64\*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
